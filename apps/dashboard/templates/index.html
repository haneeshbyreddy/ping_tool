<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <!-- Branded at runtime from the org_name setting (app.js); this is the pre-load fallback. -->
    <title>Network Monitor</title>
    <!-- Vendored locally: no CDN, works on a site with no internet. -->
    <script src="/vendor/tailwind.js"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "error": "#ffb4ab",
                        "secondary": "#c6c6cf",
                        "surface-container-highest": "#353434",
                        "surface-dim": "#141313",
                        "surface-container": "#201f1f",
                        "primary": "#ffffff",
                        "surface-bright": "#3a3939",
                        "surface-container-lowest": "#0e0e0e",
                        "surface-container-low": "#1c1b1b",
                        "on-background": "#e5e2e1",
                        "on-surface-variant": "#c4c7c8",
                        "background": "#141313",
                        "tertiary": "#ffffff",
                        "surface-variant": "#353434",
                        "outline-variant": "#444748",
                        "on-surface": "#e5e2e1",
                        "inverse-primary": "#5d5f5f",
                        "surface": "#141313",
                        "outline": "#8e9192",
                        "primary-container": "#e2e2e2",
                        "surface-container-high": "#2a2a2a",
                        "tertiary-fixed": "#e2e2e2"
                    },
                    borderRadius: { "DEFAULT": "0.375rem", "md": "0.375rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                    spacing: { "base": "4px", "section-gap": "32px", "component-padding-y": "8px", "component-padding-x": "12px", "gutter": "16px", "container-margin": "24px" },
                    fontFamily: {
                        "label-xs": ["Geist", "sans-serif"], "headline-lg": ["Geist", "sans-serif"], "headline-md": ["Geist", "sans-serif"],
                        "display": ["Geist", "sans-serif"], "body-sm": ["Geist", "sans-serif"], "mono-data": ["Geist", "monospace"],
                        "label-md": ["Geist", "sans-serif"], "body-lg": ["Geist", "sans-serif"]
                    },
                    fontSize: {
                        "label-xs": ["11px", { "lineHeight": "1", "letterSpacing": "0.03em", "fontWeight": "600" }],
                        "headline-lg": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-md": ["18px", { "lineHeight": "1.4", "fontWeight": "500" }],
                        "display": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "mono-data": ["13px", { "lineHeight": "1", "letterSpacing": "0", "fontWeight": "400" }],
                        "label-md": ["13px", { "lineHeight": "1", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "body-lg": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }]
                    },
                    animation: { 'fade-in': 'fadeIn 0.4s ease-out forwards' },
                    keyframes: { fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #141313; color: #ffffff; min-height: 100dvh; font-family: 'Geist', system-ui, sans-serif; }
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #444748; border-radius: 4px; }
        .heatmap-grid { display: grid; grid-template-columns: repeat(15, minmax(0, 1fr)); gap: 2px; width: 100%; }
        .heatmap-cell { aspect-ratio: 1; border-radius: 2px; background-color: #201f1f; }
        .heatmap-cell.active-ok { background-color: #2a2a2a; }
        .heatmap-cell.active-outage { background-color: #450a0a; }
        .ic { display: inline-block; vertical-align: middle; flex-shrink: 0; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        [data-spin] { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col font-body-sm text-body-sm bg-background text-on-background">
    <div id="root" class="flex flex-col min-h-screen w-full"></div>
    <script src="/icons.js"></script>
    <script src="/app.js"></script>
</body>
</html>
